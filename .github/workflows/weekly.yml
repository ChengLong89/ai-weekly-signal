name: Weekly AI briefing
on:
  schedule:
    - cron: "15 15 * * 1"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
concurrency:
  group: weekly-update
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -r requirements.txt
      - run: python scripts/update_news.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          GITHUB_TOKEN: ${{ github.token }}
      - name: Create article feedback links
        run: python scripts/publish_feedback.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Commit this week's briefing
        run: |
          git config user.name "ai-weekly-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/archive feed.xml
          git diff --cached --quiet || git commit -m "Update weekly AI briefing"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: {path: "."}
      - name: Deploy updated briefing
        uses: actions/deploy-pages@v4
