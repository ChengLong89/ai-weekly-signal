name: Weekly AI briefing
on:
  schedule:
    - cron: "15 15 * * 1"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
concurrency:
  group: weekly-update
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -r requirements.txt
      - run: python scripts/update_news.py
      - name: Commit this week's briefing
        run: |
          git config user.name "ai-weekly-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json feed.xml
          git diff --cached --quiet || git commit -m "Update weekly AI briefing"
          git push
      - name: Send GitHub notification
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue create --title "AI 周报已更新 · $(date +%F)" --body "本周 AI 要闻已生成并发布。打开网站查看完整内容。本通知由每周自动任务创建。"
